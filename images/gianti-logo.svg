<style type="text/css">
body,h1,h2,h3,h4,h5,h6{line-height:1.5}a,a:focus,a:hover{text-decoration:none}body,div.container,html{width:100%;height:100%}a,abbr,acronym,address,applet,article,aside,audio,b,big,blockquote,body,canvas,caption,center,cite,code,dd,del,details,dfn,div,dl,dt,em,embed,fieldset,figcaption,figure,footer,form,h1,h2,h3,h4,h5,h6,header,hgroup,html,i,iframe,img,ins,kbd,label,legend,li,mark,menu,nav,object,ol,output,p,pre,q,ruby,s,samp,section,small,span,strike,strong,sub,summary,sup,table,tbody,td,tfoot,th,thead,time,tr,tt,u,ul,var,video{margin:0;padding:0;border:0;vertical-align:baseline;outline:0}article,aside,audio,canvas,details,embed,figcaption,figure,footer,header,hgroup,main,mark,menu,nav,output,ruby,section,summary,time,video{display:block;position:relative}body{color:#353535;font-size:12px;font-family:Tahoma}blockquote,q{quotes:none}blockquote:after,blockquote:before,q:after,q:before{content:"";content:none}table{border-collapse:collapse;border-spacing:0}div{position:relative}a{outline:0!important}ol,ol ol,ol ul,ul,ul ol,ul ul{margin:10px 10px 10px 25px;padding:0;list-style:disc}ol li,ul li{padding-left:5px}ol{list-style:outside}img{vertical-align:top}p{margin-bottom:10px}hr{border-color:#ccc}.clear{display:block;clear:both;line-height:0}.opacity:hover{opacity:.7}.trans-2,.trans-all-2 *{transition:all .2s ease;-moz-transition:all .2s ease;-webkit-transition:all .2s ease;-o-transition:all .2s ease;-ms-transition:all .2s ease}.trans-3,.trans-all-3 *{transition:all .3s ease;-moz-transition:all .3s ease;-webkit-transition:all .3s ease;-o-transition:all .3s ease;-ms-transition:all .3s ease}.trans-4,.trans-all-4 *{transition:all .4s ease;-moz-transition:all .4s ease;-webkit-transition:all .4s ease;-o-transition:all .4s ease;-ms-transition:all .4s ease}.trans-5,.trans-all-5 *{transition:all .5s ease;-moz-transition:all .5s ease;-webkit-transition:all .5s ease;-o-transition:all .5s ease;-ms-transition:all .5s ease}.trans-no,.trans-no-all *{transition:none;-moz-transition:none;-webkit-transition:none;-o-transition:none;-ms-transition:none}ol.no-list li,ol.no-list ol.no-list ol,ol.no-list ul,ul.no-list,ul.no-list li,ul.no-list ol,ul.no-list ul{margin:0;padding:0;list-style:none}.no-select,.no-select-all *{user-select:none;-moz-user-select:none;-webkit-touch-callout:none;-webkit-user-select:none;-khtml-user-select:none;-ms-user-select:none}.flex{display:flex;display:-webkit-box;display:-ms-flexbox;display:-webkit-flex}div.container{align-items:center;justify-content:center}div.container div{width:300px;padding:40px 60px;background-color:#eee;border:1px solid #ddd;border-radius:5px}div.container div h1{color:#aaa;font-size:50px;font-weight:400;text-transform:uppercase}div.container div h3{margin-bottom:10px;padding-bottom:10px;color:#555;border-bottom:1px solid #ccc}div.container div a{color:#333;text-transform:uppercase}div.container div a:hover{color:#999}div.container div a:before{display:block;float:left;margin-right:7px;content:"\2190";font-size:10px}
